name: Deploy ShopSense AI to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify app imports correctly
        run: |
          python -c "
          import os
          os.environ['AZURE_OPENAI_API_KEY']         = 'test'
          os.environ['AZURE_OPENAI_ENDPOINT']        = 'https://test.openai.azure.com/'
          os.environ['AZURE_OPENAI_DEPLOYMENT_NAME'] = 'test'
          os.environ['AZURE_OPENAI_API_VERSION']     = '2024-07-18'
          os.environ['AZURE_SPEECH_KEY']             = 'test'
          os.environ['AZURE_SPEECH_REGION']          = 'eastus'
          os.environ['AZURE_VISION_KEY']             = 'test'
          os.environ['AZURE_VISION_ENDPOINT']        = 'https://test.cognitiveservices.azure.com/'
          os.environ['AZURE_LANGUAGE_KEY']           = 'test'
          os.environ['AZURE_LANGUAGE_ENDPOINT']      = 'https://test.cognitiveservices.azure.com/'
          from config import Config
          print('✅ Config OK')
          from bot.bot_handler import ShopSenseBot
          print('✅ Bot handler OK')
          "

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'shopsenseai'
          package: .                        # ← root of repo

      - name: Wait for app to start
        run: sleep 40

      - name: Health check
        run: |
          curl --fail https://shopsenseai.azurewebsites.net/health \
            && echo "✅ Deployment healthy" \
            || echo "⚠️ App may still be starting up"